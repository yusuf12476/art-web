<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Farm | Animal Tagging System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- Library to convert HTML to Image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfbf7;
            color: #1a2e1f;
        }

        .tag-shape {
            position: relative;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }

        /* Hole punch effect for physical tags */
        .tag-shape::before {
            content: '';
            position: absolute;
            top: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: #fdfbf7;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            z-index: 10;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .tag-shape { 
                break-inside: avoid; 
                border: 2px solid #000 !important;
                margin: 10px !important;
                page-break-inside: avoid;
            }
            .tag-shape::before { border: 2px solid #000 !important; background: white !important; }
        }

        .btn-primary {
            background-color: #1a5c2d;
            color: white;
            transition: transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.98); }

        /* Style for the individual save buttons */
        .save-btn {
            background: rgba(26, 92, 45, 0.1);
            color: #1a5c2d;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white border-b border-stone-200 py-4 px-6 no-print sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-[#1a5c2d] p-2 rounded-xl text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold text-[#1a5c2d]">Sunrise Farm</h1>
                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Animal Tagging System</p>
                </div>
            </div>
            <button onclick="window.print()" class="bg-[#1a5c2d] text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-[#144622] flex items-center gap-2">
                Print Page
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Control Panel -->
        <div class="lg:col-span-4 no-print">
            <div class="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm space-y-5">
                <h2 class="text-xs font-black text-stone-400 uppercase tracking-widest border-b border-stone-50 pb-3">New Batch Settings</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Species</label>
                        <select id="species" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none font-semibold text-sm">
                            <option value="COW">Bovine</option>
                            <option value="GOT">Caprine</option>
                            <option value="CHX">Poultry</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Tag Color</label>
                        <select id="tagColor" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none font-semibold text-sm">
                            <option value="#fbbf24">Yellow</option>
                            <option value="#ffffff">White</option>
                            <option value="#3b82f6">Blue</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Gender</label>
                        <select id="gender" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none font-semibold text-sm">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Serial Start</label>
                        <input type="number" id="serial" value="1001" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none font-bold text-[#1a5c2d]">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Quantity</label>
                        <input type="number" id="qty" value="4" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none font-semibold">
                    </div>
                </div>

                <button onclick="addTags()" class="w-full py-4 btn-primary rounded-2xl font-bold shadow-xl">
                    Generate Batch
                </button>
                
                <button onclick="clearAll()" class="w-full py-2 text-stone-400 text-[10px] font-black uppercase tracking-widest hover:text-red-500">
                    Clear Workspace
                </button>
            </div>
        </div>

        <!-- Tag Display -->
        <div id="tagContainer" class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
            <!-- Dynamic tags go here -->
            <div id="emptyState" class="col-span-full py-32 text-center text-stone-300 border-2 border-dashed border-stone-200 rounded-[3rem]">
                <p class="font-bold uppercase tracking-widest text-xs">Configure and generate tags above</p>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-stone-900 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-20 transition-all duration-300 z-50 text-xs font-bold uppercase tracking-widest">
        Action Successful
    </div>

    <script>
        function addTags() {
            const container = document.getElementById('tagContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            const species = document.getElementById('species').value;
            const color = document.getElementById('tagColor').value;
            const gender = document.getElementById('gender').value;
            const serialStart = parseInt(document.getElementById('serial').value);
            const qty = parseInt(document.getElementById('qty').value);

            const now = new Date();
            const dateCode = now.getFullYear().toString().slice(-2) + 
                            (now.getMonth() + 1).toString().padStart(2, '0');

            for (let i = 0; i < qty; i++) {
                const currentSerial = serialStart + i;
                const tagId = `SRF-${species}-${dateCode}-${currentSerial}`;
                const canvasId = 'bc-' + Math.random().toString(36).substr(2, 9);
                const tagUniqueId = 'tag-' + Math.random().toString(36).substr(2, 9);

                const tagWrapper = document.createElement('div');
                tagWrapper.className = 'flex flex-col gap-2';

                tagWrapper.innerHTML = `
                    <div id="${tagUniqueId}" class="tag-shape p-8 pt-12 flex flex-col justify-between shadow-sm hover:shadow-md" style="min-height: 240px; background-color: white;">
                        <div class="relative z-10">
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-[10px] font-black uppercase px-2.5 py-1 rounded-full border border-black/10 shadow-sm" style="background-color: ${color}">
                                    ${species} #${currentSerial}
                                </span>
                                <span class="text-[9px] font-bold text-stone-400 uppercase">${gender}</span>
                            </div>
                            <h3 class="text-2xl font-black tracking-tighter text-stone-800 font-mono">${tagId}</h3>
                        </div>
                        
                        <div class="mt-auto flex items-end justify-between">
                            <div class="space-y-1">
                                <p class="text-[9px] font-bold text-stone-300 uppercase">${now.toLocaleDateString()}</p>
                            </div>
                            <div class="flex flex-col items-end">
                                <svg id="${canvasId}"></svg>
                                <span class="text-[8px] font-mono mt-1 text-stone-400 font-bold">${tagId}</span>
                            </div>
                        </div>
                    </div>
                    <div class="no-print flex justify-between px-2">
                        <button onclick="copyText('${tagId}')" class="save-btn">Copy ID</button>
                        <button onclick="saveTagAsImage('${tagUniqueId}', '${tagId}')" class="save-btn" style="background: #1a5c2d; color: white;">Save to Gallery</button>
                    </div>
                `;

                container.prepend(tagWrapper);

                // Initialize barcode
                JsBarcode(`#${canvasId}`, tagId, {
                    format: "CODE128",
                    width: 1.2,
                    height: 40,
                    displayValue: false,
                    lineColor: "#000",
                    margin: 0
                });
            }

            // Increment serial for next batch
            document.getElementById('serial').value = serialStart + qty;
        }

        async function saveTagAsImage(elementId, tagId) {
            const element = document.getElementById(elementId);
            const toast = document.getElementById('toast');
            
            showToast("Generating Image...");

            try {
                // Wait a tiny bit for any rendering
                const canvas = await html2canvas(element, {
                    backgroundColor: null,
                    scale: 3, // High quality
                    logging: false,
                    useCORS: true
                });

                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = image;
                link.download = `${tagId}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showToast("Saved to Downloads");
            } catch (err) {
                console.error(err);
                showToast("Failed to save");
            }
        }

        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("ID Copied");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-20');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-20'), 2000);
        }

        function clearAll() {
            document.getElementById('tagContainer').innerHTML = `
                <div id="emptyState" class="col-span-full py-32 text-center text-stone-300 border-2 border-dashed border-stone-200 rounded-[3rem]">
                    <p class="font-bold uppercase tracking-widest text-xs">Configure and generate tags above</p>
                </div>
            `;
        }
    </script>
</body>
</html>
